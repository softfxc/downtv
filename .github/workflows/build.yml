# This is a basic workflow to help you get started with Actions

name: Compilar APK desde ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Comprobar archivos
        run: |
          ls -la
          test -f DownTV.zip

      - name: Descomprimir proyecto
        run: |
          unzip DownTV.zip -d proyecto
          GRADLEW_PATH=$(find proyecto -name gradlew | head -n 1)
          echo "Gradle encontrado en: $GRADLEW_PATH"
          test -n "$GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"

      - name: Compilar APK debug
        run: |
          GRADLEW_PATH=$(find proyecto -name gradlew | head -n 1)
          cd "$(dirname "$GRADLEW_PATH")"
          ./gradlew assembleDebug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-debug
          path: proyecto/**/app/build/outputs/apk/debug/*.apk
